# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: auto-pull

before:
  hooks:
    - go mod tidy

builds:
  - id: autopull
    main: ./cmd
    # Using a path here places the binary inside the .app bundle structure
    # within the archive automatically — no wrap_in_directory needed.
    binary: "Auto Pull.app/Contents/MacOS/autopull"
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
    hooks:
      post:
        # Generate Info.plist into dist/ so the archive can pick it up.
        # Guarded so the second architecture build doesn't regenerate it.
        - cmd: >-
            bash -c '
            set -euo pipefail;
            P="dist/Info.plist";
            if [ ! -f "$P" ]; then
              echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > "$P";
              echo "<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">" >> "$P";
              echo "<plist version=\"1.0\">" >> "$P";
              echo "<dict>" >> "$P";
              echo "  <key>CFBundleExecutable</key>" >> "$P";
              echo "  <string>autopull</string>" >> "$P";
              echo "  <key>CFBundleIconFile</key>" >> "$P";
              echo "  <string>icon.icns</string>" >> "$P";
              echo "  <key>CFBundleGetInfoString</key>" >> "$P";
              echo "  <string>Auto Pull</string>" >> "$P";
              echo "  <key>CFBundleIdentifier</key>" >> "$P";
              echo "  <string>com.github.adreasnow.auto-pull</string>" >> "$P";
              echo "  <key>CFBundleName</key>" >> "$P";
              echo "  <string>Auto Pull</string>" >> "$P";
              echo "  <key>CFBundleShortVersionString</key>" >> "$P";
              echo "  <string>{{ .Version }}</string>" >> "$P";
              echo "  <key>CFBundleInfoDictionaryVersion</key>" >> "$P";
              echo "  <string>6.0</string>" >> "$P";
              echo "  <key>CFBundlePackageType</key>" >> "$P";
              echo "  <string>APPL</string>" >> "$P";
              echo "  <key>IFMajorVersion</key>" >> "$P";
              echo "  <integer>0</integer>" >> "$P";
              echo "  <key>IFMinorVersion</key>" >> "$P";
              echo "  <integer>1</integer>" >> "$P";
              echo "  <key>NSHighResolutionCapable</key><true/>" >> "$P";
              echo "  <key>NSSupportsAutomaticGraphicsSwitching</key><true/>" >> "$P";
              echo "</dict>" >> "$P";
              echo "</plist>" >> "$P";
            fi
            '

# Each archive is a zip containing a complete macOS .app bundle:
#
#   Auto Pull.app/
#     Contents/
#       Info.plist
#       MacOS/
#         autopull          <- from the build binary path
#       Resources/
#         icon.icns
#         cloud.png
#         sun.png
#         warning.png
#
archives:
  - id: app-bundle
    format: zip
    name_template: "auto-pull_darwin_{{ .Arch }}"
    files:
      - src: dist/Info.plist
        dst: "Auto Pull.app/Contents"
        strip_parent: true
      - src: icons/icon.icns
        dst: "Auto Pull.app/Contents/Resources"
        strip_parent: true
      - src: icons/cloud.png
        dst: "Auto Pull.app/Contents/Resources"
        strip_parent: true
      - src: icons/sun.png
        dst: "Auto Pull.app/Contents/Resources"
        strip_parent: true
      - src: icons/warning.png
        dst: "Auto Pull.app/Contents/Resources"
        strip_parent: true

homebrew_casks:
  - name: auto-pull
    ids:
      - app-bundle
    # Injects an `app` stanza at the top of the cask so Homebrew symlinks
    # the .app bundle into /Applications on install.
    custom_block: |
      app "Auto Pull.app"
    binaries:
      - "Auto Pull.app/Contents/MacOS/autopull"
    repository:
      owner: adreasnow
      name: homebrew-tap
      token: "{{ .Env.TAPS_KEY }}"
    homepage: "https://github.com/adreasnow/auto-pull"
    description: "Automatically pull git repositories on a schedule (macOS menu bar app)"
    # Strip the quarantine attribute so macOS does not block the unsigned app.
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/Auto Pull.app"]
    uninstall:
      quit:
        - "com.github.adreasnow.auto-pull"
    zap:
      trash:
        - "~/.config/auto-pull"
        - "~/Library/Logs/com.github.adreasnow.auto-pull"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "\\[AUTOMATED\\]"
